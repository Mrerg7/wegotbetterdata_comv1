<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | WeGotBetterData.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050914;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 6rem; font-weight: 700; color: #38bdf8; line-height: 1; }
    p { margin-top: 1rem; color: #64748b; font-size: 1.125rem; }
    a {
      display: inline-block;
      margin-top: 2rem;
      color: #38bdf8;
      text-decoration: none;
      border: 1px solid #38bdf8;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    a:hover { background: #38bdf8; color: #050914; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>The data you're looking for doesn't exist.</p>
    <a href="/">Return Home</a>
  </div>
</body>
</html>
